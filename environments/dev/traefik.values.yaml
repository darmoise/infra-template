service:
  type: ClusterIP

ingressClass:
  enabled: true
  isDefaultClass: false
  name: traefik

providers:
  kubernetesIngress:
    enabled: true

updateStrategy:
  type: Recreate

ports:
  web:
    hostPort: 80
    expose:
      default: true
    exposedPort: 80
    protocol: TCP

  websecure:
    hostPort: 443
    expose:
      default: true
    exposedPort: 443
    protocol: TCP

additionalArguments:
  - "--entrypoints.web.http.redirections.entrypoint.to=:443"
  - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
  - "--entrypoints.web.http.redirections.entrypoint.permanent=true"