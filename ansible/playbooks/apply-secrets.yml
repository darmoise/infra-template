---
- name: Apply Kubernetes secrets for EasyChat environment
  hosts: local
  gather_facts: false

  vars:
    kubeconfig_path: "{{ lookup('env', 'KUBECONFIG') | default('/etc/rancher/k3s/k3s.yaml', true) }}"
    namespaces:
      dev: easychat-dev
      stage: easychat-stage

  pre_tasks:
    - name: Validate env argument
      ansible.builtin.assert:
        that:
          - env is defined
          - env in namespaces.keys()
        fail_msg: "Pass a valid env: -e env=dev or -e env=stage"

    - name: Set target namespace
      ansible.builtin.set_fact:
        target_namespace: "{{ namespaces[env] }}"

    - name: Check encrypted vault file exists
      ansible.builtin.stat:
        path: "{{ playbook_dir }}/../group_vars/{{ env }}/vault.yml"
      register: vault_file

    - name: Fail if encrypted vault file is missing
      ansible.builtin.fail:
        msg: "Vault file not found: {{ playbook_dir }}/../group_vars/{{ env }}/vault.yml"
      when: not vault_file.stat.exists

    - name: Load encrypted environment secrets
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../group_vars/{{ env }}/vault.yml"
      no_log: true

    - name: Validate required secret variables
      ansible.builtin.assert:
        that:
          - postgres_password is defined and postgres_password | length > 0
          - spring_datasource_password is defined and spring_datasource_password | length > 0
          - spring_mail_password is defined and spring_mail_password | length > 0
          - jwt_secret is defined and jwt_secret | length > 0
          - tx_processor_secret_key is defined and tx_processor_secret_key | length > 0
          - encryption_key is defined and encryption_key | length > 0
          - rpc_helius_api_key is defined and rpc_helius_api_key | length > 0
          - rpc_alchemy_api_key is defined and rpc_alchemy_api_key | length > 0
          - ghcr_username is defined and ghcr_username | length > 0
          - ghcr_token is defined and ghcr_token | length > 0
          - postgres_password == spring_datasource_password
        fail_msg: "Vault vars are incomplete or DB passwords do not match. postgres_password must equal spring_datasource_password."
      no_log: true

    - name: Check kubectl client exists
      ansible.builtin.command:
        argv:
          - kubectl
          - version
          - --client=true
      changed_when: false

    - name: Check Kubernetes API access
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig={{ kubeconfig_path }}
          - get
          - namespace
          - default
      changed_when: false

  tasks:
    - name: Ensure target namespace exists
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig="{{ kubeconfig_path }}" create namespace "{{ target_namespace }}" \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig="{{ kubeconfig_path }}" apply -f -
      args:
        executable: /bin/bash
      register: namespace_apply
      changed_when: "'created' in namespace_apply.stdout"

    - name: Apply GHCR imagePullSecret
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig="{{ kubeconfig_path }}" -n "{{ target_namespace }}" \
          create secret docker-registry ghcr-credentials \
          --docker-server=ghcr.io \
          --docker-username="{{ ghcr_username }}" \
          --docker-password="{{ ghcr_token }}" \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig="{{ kubeconfig_path }}" apply -f -
      args:
        executable: /bin/bash
      register: ghcr_secret_apply
      changed_when: "'created' in ghcr_secret_apply.stdout or 'configured' in ghcr_secret_apply.stdout"
      no_log: true

    - name: Apply postgres-secret
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig="{{ kubeconfig_path }}" -n "{{ target_namespace }}" \
          create secret generic postgres-secret \
          --from-literal=POSTGRES_PASSWORD="{{ postgres_password }}" \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig="{{ kubeconfig_path }}" apply -f -
      args:
        executable: /bin/bash
      register: postgres_secret_apply
      changed_when: "'created' in postgres_secret_apply.stdout or 'configured' in postgres_secret_apply.stdout"
      no_log: true

    - name: Apply account-api-secret
      ansible.builtin.shell: |
        set -euo pipefail
        kubectl --kubeconfig="{{ kubeconfig_path }}" -n "{{ target_namespace }}" \
          create secret generic account-api-secret \
          --from-literal=SPRING_DATASOURCE_PASSWORD="{{ spring_datasource_password }}" \
          --from-literal=SPRING_MAIL_PASSWORD="{{ spring_mail_password }}" \
          --from-literal=JWT_SECRET="{{ jwt_secret }}" \
          --from-literal=TX_PROCESSOR_SECRET_KEY="{{ tx_processor_secret_key }}" \
          --from-literal=ENCRYPTION_KEY="{{ encryption_key }}" \
          --from-literal=RPC_HELIUS_API_KEY="{{ rpc_helius_api_key }}" \
          --from-literal=RPC_ALCHEMY_API_KEY="{{ rpc_alchemy_api_key }}" \
          --dry-run=client -o yaml | \
        kubectl --kubeconfig="{{ kubeconfig_path }}" apply -f -
      args:
        executable: /bin/bash
      register: app_secret_apply
      changed_when: "'created' in app_secret_apply.stdout or 'configured' in app_secret_apply.stdout"
      no_log: true

    - name: Verify required secrets exist
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig={{ kubeconfig_path }}
          - -n
          - "{{ target_namespace }}"
          - get
          - secret
          - ghcr-credentials
          - postgres-secret
          - account-api-secret
      changed_when: false
